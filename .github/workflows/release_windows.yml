name: Release Helper for Windows on GitHub / AWS

on:
  workflow_dispatch:

# Auto cancel previous runs if they were not completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Write permissions are required to upload the release asset.
permissions: write-all

jobs:
  build:
    runs-on: vm-runner-windows

    env:
      EDAMAME_HELPER_SENTRY: ${{ secrets.EDAMAME_HELPER_SENTRY }}
      PWNED_API_KEY: ${{ secrets.PWNED_API_KEY }}
      EDAMAME_TARGET: ${{ secrets.EDAMAME_TARGET }}
      EDAMAME_SERVER: ${{ secrets.EDAMAME_SERVER }}
      EDAMAME_SERVER_PEM: ${{ secrets.EDAMAME_SERVER_PEM }}
      EDAMAME_SERVER_KEY: ${{ secrets.EDAMAME_SERVER_KEY }}
      EDAMAME_CA_PEM: ${{ secrets.EDAMAME_CA_PEM }}
      EDAMAME_CLIENT_PEM: ${{ secrets.EDAMAME_CLIENT_PEM }}
      EDAMAME_CLIENT_KEY: ${{ secrets.EDAMAME_CLIENT_KEY }}
      EDAMAME_CLIENT_CA_PEM: ${{ secrets.EDAMAME_CLIENT_CA_PEM }}
      LAMBDA_SIGNATURE: ${{ secrets.LAMBDA_SIGNATURE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:

      - name: Setup EDAMAME Posture
        if: github.ref == 'refs/heads/main'
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}
          auto_remediate: true
          network_scan: true
          auto_whitelist: true
          wait_for_api: true
          checkout: true

      - name: Install additional packages w/ Chocolatey
        run: |
          choco install protoc wget
          # Only install AzureSignTool if not already installed
          if (-not (dotnet tool list --global | Select-String -Pattern "AzureSignTool")) {
            dotnet tool install --global AzureSignTool
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup for edamame_helper
        shell: bash
        run: |
          cargo install cargo-wix
          choco install wixtoolset
          echo "/c/Program\ Files\ \(x86\)/Windows\ Kits/10/bin/10.0.19041.0/x64" >> $GITHUB_PATH

      - name: Build helper and its standalone installer
        shell: bash
        run: |
          set -e
          cargo build --release
          # cargo wix invokes WIX light.exe on the just-built binaries.
          # Self-hosted Windows runner (vm-runner-windows) has Windows
          # Defender real-time protection enabled, and Defender's heuristics
          # occasionally false-positive on freshly-built edamame_helper.exe
          # (a security tool that hooks process/network events). When that
          # race hits, light.exe gets LGHT0001 "the file contains a virus
          # or potentially unwanted software" and exits 1 even though no
          # actual malware is present. Retry the WIX step a few times with
          # backoff so a single Defender heuristic miss does not block the
          # release; if every attempt fails we surface the original error.
          attempt=0
          max_attempts=5
          while : ; do
            attempt=$((attempt + 1))
            if cargo wix --nocapture --no-build; then
              echo "cargo wix succeeded on attempt ${attempt}"
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "cargo wix failed after ${max_attempts} attempts; giving up"
              exit 1
            fi
            sleep_for=$((attempt * 30))
            echo "cargo wix attempt ${attempt} failed (likely Defender false-positive on light.exe); retrying in ${sleep_for}s..."
            sleep "${sleep_for}"
          done

      - name: Signing of the Helper
        # We can't use bash here, as the AzureSignTool is a .NET tool
        run: |
          $VERSION = (Get-Content ./Cargo.toml | Select-String '^version =' | ForEach-Object { $_.Line.Split('=')[1].Trim().Trim('"') })
          AzureSignTool sign -kvt ${{ secrets.AZURE_SIGN_TENANT_ID }} -kvu ${{ secrets.AZURE_SIGN_KEY_VAULT_URI }} -kvi ${{ secrets.AZURE_SIGN_CLIENT_ID }} -kvs ${{ secrets.AZURE_SIGN_CLIENT_SECRET }} -kvc ${{ secrets.AZURE_SIGN_CERT_NAME }} -tr http://timestamp.digicert.com -v ./target/wix/edamame_helper-$VERSION-x86_64.msi

      - name: Naming of the Helper
        shell: bash
        run: |
          VERSION=$(grep '^version =' ./Cargo.toml | awk '{print $3}' | tr -d '"')
          # Final naming with version, with the hope of future universal arm/x86 packages like with macOS...
          cp ./target/wix/edamame_helper-${VERSION}-x86_64.msi ./target/wix/edamame-helper-windows-${VERSION}.msi
          
      # Main only (upload to base folder)
      - name: Upload helper to AWS
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          VERSION=$(grep '^version =' ./Cargo.toml | awk '{print $3}' | tr -d '"')
          aws s3 cp ./target/wix/edamame-helper-windows-${VERSION}.msi s3://edamame-helper/windows/edamame-helper-windows-${VERSION}.msi --acl public-read

      # Main only
      - name: Check for existing release
        if: github.ref == 'refs/heads/main'
        id: get_release
        shell: bash
        run: |
          VERSION=$(grep '^version =' ./Cargo.toml | awk '{print $3}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          VERSION_TAG=v${VERSION}
          echo "tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          if [[ -n "$(gh release view $VERSION_TAG --repo ${{ github.repository }} --json id -q .id)" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "upload_url=$(gh release view $VERSION_TAG --json uploadUrl -q .uploadUrl)" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Main only
      - name: Create release if it doesn't exist
        if: github.ref == 'refs/heads/main' && steps.get_release.outputs.exists != 'true'
        # This populates steps.get_release.outputs.upload_url with the upload_url of the release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_release.outputs.tag }}
          release_name: Release ${{ steps.get_release.outputs.tag }}
          draft: false
          prerelease: false

      # Update the tag if it exists and points to a different commit
      - name: Update the tag if it exists and points to a different commit
        if: github.ref == 'refs/heads/main' && steps.get_release.outputs.exists == 'true'
        run: |
          gh release edit ${{ steps.get_release.outputs.tag }} --repo ${{ github.repository }} --target ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Find next available Chocolatey version (appends .1, .2, ... suffix if base exists)
      - name: Resolve Chocolatey package version
        if: github.ref == 'refs/heads/main'
        id: check_choco
        shell: pwsh
        run: |
          $BASE_VERSION = "${{ steps.get_release.outputs.version }}"
          $CHOCO_VERSION = $BASE_VERSION

          function Test-ChocoVersionExists($ver) {
            try {
              $null = Invoke-WebRequest -Uri "https://community.chocolatey.org/api/v2/package/edamame-helper/$ver" -Method Head -UseBasicParsing -ErrorAction Stop
              return $true
            } catch {
              return $false
            }
          }

          if (Test-ChocoVersionExists $BASE_VERSION) {
            Write-Host "Chocolatey package edamame-helper version $BASE_VERSION already exists - probing suffixes..."
            $found = $false
            for ($i = 1; $i -le 20; $i++) {
              $candidate = "${BASE_VERSION}.${i}"
              if (-not (Test-ChocoVersionExists $candidate)) {
                Write-Host "Using next available Chocolatey version: $candidate"
                $CHOCO_VERSION = $candidate
                $found = $true
                break
              }
              Write-Host "  $candidate also exists, trying next..."
            }
            if (-not $found) {
              Write-Host "ERROR: All suffix versions up to ${BASE_VERSION}.20 are taken. Bump Cargo.toml."
              exit 1
            }
          } else {
            Write-Host "Chocolatey package edamame-helper version $BASE_VERSION not found - will publish"
          }

          Write-Host "Resolved Chocolatey version: $CHOCO_VERSION"
          echo "choco_version=$CHOCO_VERSION" >> $env:GITHUB_OUTPUT

      # Main only - use an explicit absolute path and verify the asset exists on the release.
      - name: Upload asset to release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_release.outputs.version }}"
          TAG="${{ steps.get_release.outputs.tag }}"
          ASSET_PATH="${GITHUB_WORKSPACE}/target/wix/edamame-helper-windows-${VERSION}.msi"

          if [[ ! -f "$ASSET_PATH" ]]; then
            echo "ERROR: expected Windows MSI missing: $ASSET_PATH"
            exit 1
          fi

          gh release upload "$TAG" "$ASSET_PATH" \
            --repo "${{ github.repository }}" \
            --clobber

          EXPECTED_ASSET="edamame-helper-windows-${VERSION}.msi"
          ASSET_NAMES="$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"

          echo "$ASSET_NAMES"

          FOUND=false
          while IFS= read -r name; do
            if [[ "$name" == "$EXPECTED_ASSET" ]]; then
              FOUND=true
              break
            fi
          done <<< "$ASSET_NAMES"

          if [[ "$FOUND" != true ]]; then
            echo "ERROR: release asset verification failed: $EXPECTED_ASSET"
            exit 1
          fi

      # Publish to Chocolatey with resolved version (may include .N suffix)
      - name: Publish to Chocolatey
        if: github.ref == 'refs/heads/main'
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $VERSION="${{ steps.get_release.outputs.version }}"
          $CHOCO_VERSION="${{ steps.check_choco.outputs.choco_version }}"
          Write-Host "Cargo version: $VERSION / Chocolatey version: $CHOCO_VERSION"
          
          # Download the release asset to calculate SHA256 (retry for CDN propagation delay)
          $DownloadUrl = "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/edamame-helper-windows-${VERSION}.msi"
          $DownloadPath = "edamame-helper-windows-${VERSION}.msi"
          Write-Host "Downloading: $DownloadUrl"
          $maxRetries = 5
          $retryDelaySec = 10
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Invoke-WebRequest -Uri $DownloadUrl -OutFile $DownloadPath -UseBasicParsing
              break
            } catch {
              if ($i -eq $maxRetries) { throw }
              Write-Host "Attempt $i failed, retrying in ${retryDelaySec}s..."
              Start-Sleep -Seconds $retryDelaySec
            }
          }
          $SHA_WIN = (Get-FileHash -Algorithm SHA256 $DownloadPath).Hash.ToLower()
          Write-Host "SHA256: $SHA_WIN"
          
          # Update Chocolatey Package with resolved version
          (Get-Content chocolatey/edamame-helper.nuspec) -replace '<version>.*</version>', "<version>${CHOCO_VERSION}</version>" | Set-Content chocolatey/edamame-helper.nuspec
          (Get-Content chocolatey/tools/chocolateyInstall.ps1) -replace '\$url64 = ''.*''', "`$url64 = 'https://github.com/${{ github.repository }}/releases/download/v${VERSION}/edamame-helper-windows-${VERSION}.msi'" | Set-Content chocolatey/tools/chocolateyInstall.ps1
          (Get-Content chocolatey/tools/chocolateyInstall.ps1) -replace '\$checksum64 = ''.*''', "`$checksum64 = '${SHA_WIN}'" | Set-Content chocolatey/tools/chocolateyInstall.ps1
          
          # Pack Chocolatey package
          Write-Host "Packing Chocolatey package..."
          choco pack chocolatey/edamame-helper.nuspec
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: choco pack failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          
          # Publish to Chocolatey if API key is present
          if ("${{ secrets.CHOCOLATEY_API_KEY }}" -ne "") {
            Write-Host "Pushing to Chocolatey..."
            choco push edamame-helper.${CHOCO_VERSION}.nupkg -s https://push.chocolatey.org/ -k ${{ secrets.CHOCOLATEY_API_KEY }} --verbose
            if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: choco push failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          } else {
            Write-Host "Skipping Chocolatey publish: CHOCOLATEY_API_KEY not set"
          }

      - name: Check job status before posture dump
        id: job_status_check
        if: failure()
        run: echo "job_was_failing=true" >> "$GITHUB_OUTPUT"

      - name: Dump EDAMAME Posture sessions
        id: dump_sessions
        if: always()
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          dump_sessions_log: true
          promote_exceptions: ${{ vars.EDAMAME_AUTO_WHITELIST_PROMOTE_EXCEPTIONS }}

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: "${{ steps.job_status_check.outcome == 'success' && '[JOB FAILURE]' || '' }}${{ steps.dump_sessions.outcome == 'failure' && '[POSTURE POST JOB FAILURE]' || '' }} Release workflow ${{ github.workflow }} for ${{ github.repository }} on ${{ runner.os }} failed: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}